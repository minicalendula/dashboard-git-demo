  name: "dashboard-test-bundle"

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  # The 'dev' target, for development purposes. This target is the default.
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405612683987992.12.azuredatabricks.net
      

  # The 'prod' target, used for production deployment.
  test:
    mode: production

    workspace:
      host: https://adb-7405612683987992.12.azuredatabricks.net
      # We always use /Users/kskwon@cnthoth-domo.com for all resources to make sure we only have a single copy.
      #root_path: /Users/kskwon@cnthoth-domo.com/.bundle/${bundle.name}/${bundle.target}
    run_as:
      user_name: kskwon@cnthoth-domo.com
